name: Codex Automated PR

on:
  workflow_dispatch:
    inputs:
      issue_key:
        description: 'JIRA issue key (e.g., PROJ-123)'
        required: true
      issue_summary:
        description: 'Brief summary of the issue'
        required: true
      issue_description:
        description: 'Detailed issue description'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  codex_auto_pr:
    runs-on: ubuntu-latest

    steps:
      # 0 – Checkout repository
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1 – Set up Node.js and Codex
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      # 2 – Export / clean inputs
      - id: vars
        run: |
          echo "ISSUE_KEY=${{ github.event.inputs.issue_key }}" >> $GITHUB_ENV
          echo "TITLE=${{ github.event.inputs.issue_summary }}" >> $GITHUB_ENV
          echo "RAW_DESC=${{ github.event.inputs.issue_description }}" >> $GITHUB_ENV
          DESC_CLEANED=$(echo "${{ github.event.inputs.issue_description }}" | tr '\n' ' ' | sed 's/"/'\''/g')
          echo "DESC=$DESC_CLEANED" >> $GITHUB_ENV
          echo "BRANCH=codex/${{ github.event.inputs.issue_key }}" >> $GITHUB_ENV

      # 3 – Debug key presence without exposing the value
      - name: Debug Codex key presence
        env:
          CODEX_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$CODEX_API_KEY" ]; then
            echo "CODEX_API_KEY is missing"
            exit 1
          else
            echo "::add-mask::$CODEX_API_KEY"
            echo "CODEX_API_KEY is present"
            echo "Length: ${#CODEX_API_KEY}"
          fi

      # 4 – Authenticate Codex with API key
      - name: Authenticate Codex
        env:
          CODEX_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          printenv CODEX_API_KEY | codex login --with-api-key

      # 5 – Transition Jira issue to In Progress
      - name: Jira – Transition to In Progress
        env:
          ISSUE_KEY: ${{ env.ISSUE_KEY }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          set -e
          curl -sS -X POST \
            --url "$JIRA_BASE_URL/rest/api/3/issue/$ISSUE_KEY/transitions" \
            --user "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            --header 'Content-Type: application/json' \
            --data '{"transition":{"id":"21"}}'

      # 6 – Set Git author for CI commits
      - name: Set Git author for CI commits
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      # 7 – Let Codex implement & commit
      - name: Codex implement & commit
        env:
          CODEX_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_KEY: ${{ env.ISSUE_KEY }}
          TITLE: ${{ env.TITLE }}
          DESC: ${{ env.DESC }}
        run: |
          set -e
          codex exec --full-auto "Implement JIRA ticket $ISSUE_KEY: $TITLE. $DESC"

          git status --short
          git add -A
          git commit -m "feat($ISSUE_KEY): $TITLE" || echo "No changes to commit"

      # 8 – Open and push the PR
      - id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: ${{ env.BRANCH }}
          title: "${{ env.TITLE }} (${{ env.ISSUE_KEY }})"
          body: |
            Auto-generated by Codex for JIRA **${{ env.ISSUE_KEY }}**.
            ---
            ${{ env.DESC }}

      # 9 – Transition Jira to In Review and comment PR link 
      - name: Jira – Transition to In Review & Comment PR link
        env:
          ISSUE_KEY: ${{ env.ISSUE_KEY }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
        run: |
          set -e
          curl -sS -X POST \
            --url "$JIRA_BASE_URL/rest/api/3/issue/$ISSUE_KEY/transitions" \
            --user "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            --header 'Content-Type: application/json' \
            --data '{"transition":{"id":"31"}}'

          curl -sS -X POST \
            --url "$JIRA_BASE_URL/rest/api/3/issue/$ISSUE_KEY/comment" \
            --user "$JIRA_EMAIL:$JIRA_API_TOKEN" \
            --header 'Content-Type: application/json' \
            --data "{\"body\":{\"type\":\"doc\",\"version\":1,\"content\":[{\"type\":\"paragraph\",\"content\":[{\"type\":\"text\",\"text\":\"PR created: $PR_URL\"}]}]}}"